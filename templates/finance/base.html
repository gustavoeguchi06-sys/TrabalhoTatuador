{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0c0b10">
    <meta name="build" content="3">
    <title>{% block title %}Estúdio{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
    {# ?v= força o navegador a baixar a versão nova quando o CSS/JS mudar #}
    <link rel="stylesheet" href="{% static 'css/visual.css' %}?v=3">
</head>
<body>
    <header class="top">
        <div class="top-inner">
            <a class="brand" href="{% url 'finance:list' %}">
                <svg class="brand-mark" viewBox="0 0 24 24" aria-hidden="true">
                    <line x1="4" y1="20" x2="17" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="15" y1="5" x2="19" y2="9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="4.6" cy="19.4" r="1.6" fill="currentColor" stroke="none"/>
                </svg>
                <span>Estúdio</span>
            </a>
            <nav class="nav">
                <a href="{% url 'finance:list' %}" class="nav-link {% if active_page == 'finance' %}active{% endif %}">Financeiro</a>
                <a href="{% url 'finance:agenda' %}" class="nav-link {% if active_page == 'agenda' %}active{% endif %}">Agenda</a>
            </nav>
            <button id="btnNotify" class="btn-notify" type="button" title="Receber lembretes das sessões">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a6 6 0 0 0-6 6v3.3l-1.5 3.2a.8.8 0 0 0 .7 1.1h13.6a.8.8 0 0 0 .7-1.1L18 12.3V9a6 6 0 0 0-6-6Zm-2 15a2 2 0 0 0 4 0" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/></svg>
                <span id="btnNotifyLabel">Ativar lembretes</span>
            </button>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="foot">Controle do estúdio — financeiro e agenda</footer>

    <script>
        window.CSRF_TOKEN = '{{ csrf_token }}';
    </script>
    <script src="{% static 'js/app.js' %}?v=3"></script>
</body>
</html>
